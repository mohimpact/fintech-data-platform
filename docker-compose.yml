services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    hostname: kafka
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 15

  kafka-setup:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw_transactions --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic clean_transactions --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dead_letter_queue --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --list

  minio:
    image: minio/minio:RELEASE.2023-08-09T23-30-22Z
    hostname: minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mc alias set local http://minio:9000 minioadmin minioadmin &&
       mc mb --ignore-existing local/warehouse &&
       mc mb --ignore-existing local/checkpoints"

  spark-streaming-job:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    image: fintech-spark-app:latest
    container_name: spark-streaming-job
    depends_on:
      kafka:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPARK_MASTER_URL: local[2]
      CHECKPOINT_BASE: /app/checkpoints
    volumes:
      - ./checkpoints:/app/checkpoints
    restart: on-failure
    command: ["python", "-m", "fintech_platform.streaming"]

  lakehouse-bronze:
    image: fintech-spark-app:latest
    pull_policy: never
    container_name: lakehouse-bronze
    depends_on:
      spark-streaming-job:
        condition: service_started
      minio-setup:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: http://minio:9000
      WAREHOUSE_PATH: s3a://warehouse/
      BRONZE_CHECKPOINT: /app/checkpoints/bronze_ingestion
    volumes:
      - ./checkpoints:/app/checkpoints
    restart: on-failure
    command: ["python", "-m", "fintech_platform.lakehouse.bronze"]

  airflow-standalone:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow-standalone
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src/fintech_platform:/opt/airflow/src/fintech_platform
      - ./checkpoints:/opt/airflow/checkpoints
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db?timeout=60
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: 300
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: 300
      AIRFLOW__WEBSERVER__WORKERS: 1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: http://minio:9000
      WAREHOUSE_PATH: s3a://warehouse/
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    command: standalone

  analytics-dashboard:
    build:
      context: .
      dockerfile: docker/analytics/Dockerfile
    container_name: analytics-dashboard
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: http://minio:9000
      GOLD_DATA_PATH: warehouse/local/gold/merchant_metrics/data
    restart: unless-stopped

volumes:
  minio_data:

name: Fintech Data Platform CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install Linting & Testing Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/dev.txt
        
    - name: Lint with flake8
      run: |
        flake8 src tests airflow --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src tests airflow --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Tests with pytest
      env:
        PYTHONPATH: ${{ github.workspace }}/src
      run: |
        pytest tests -v
